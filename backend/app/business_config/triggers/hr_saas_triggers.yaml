      - "raised Series A"
      - "secured Series A"
      - "Series A funding"
      - "Series A round"
      - "raises seed"
      - "raises Series B"
      - "raises Series C"
      - "raised seed funding"
      - "pre-seed raised"
      - "funding round"
      - "venture backed"
      - "invests million"
      - "secured equity"
      - "capital growth round"
