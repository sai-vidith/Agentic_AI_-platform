domain: hr_saas
triggers:
  - id: series_a_funding
    type: "funding"
    keywords:
      - "raises Series A"
      - "raised Series A"
      - "secured Series A"
      - "Series A funding"
      - "Series A round"
    score_boost: 25
    description: "Series A round signals rapid scaling and need for professional HR setup."
  - id: high_growth_hiring
    type: "hiring"
    keywords:
      - "plans to hire"
      - "plans to double headcount"
      - "hiring blitz"
      - "expansion plans"
      - "new office"
    score_boost: 20
    description: "Intent to hire heavily indicates immediate need for recruitment tooling."
  - id: leadership_change_hr
    type: "leadership"
    keywords:
      - "joins as Head of People"
      - "appointed Head of HR"
      - "new VP of People"
      - "joins as VP of HR"
    score_boost: 15
    description: "New People Ops leader often reviews and updates the HR tool stack."
  - id: generic_funding
    type: "funding"
    keywords:
      - "raises seed"
      - "raises Series B"
      - "funding round"
      - "venture backed"
    score_boost: 15
    description: "General funding signals capital injection and impending growth."
