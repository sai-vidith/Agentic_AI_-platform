domain: cybersecurity
triggers:
  - id: compliance_push
    type: "compliance"
    keywords:
      - "preparing for SOC 2"
      - "achieved SOC 2"
      - "seeking ISO 27001"
      - "GDPR audit"
      - "compliance readiness"
    score_boost: 25
    description: "Startups preparing for SOC 2 or ISO audits have high immediate demand for security controls."
  - id: series_a_funding
    type: "funding"
    keywords:
      - "raises Series A"
      - "secured Series A"
      - "Series A funding"
      - "raised Series A"
      - "funding round"
    score_boost: 20
    description: "Post-Series A funding requires startups to build secure infrastructure to sell to enterprise accounts."
  - id: security_leadership_change
    type: "leadership"
    keywords:
      - "joins as CISO"
      - "appointed Head of Security"
      - "new VP of Security"
      - "appoints new CISO"
    score_boost: 20
    description: "A new CISO or security lead typically initiates tool audits and implements new security vendor solutions."
  - id: global_expansion
    type: "expansion"
    keywords:
      - "enters US market"
      - "expands to Europe"
      - "global expansion"
      - "opening new data center"
    score_boost: 15
    description: "Entering new geographies triggers strict regulatory requirements (GDPR, CCPA, HIPAA) requiring security audits."
