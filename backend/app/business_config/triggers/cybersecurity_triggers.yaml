domain: cybersecurity
triggers:
  - id: compliance_push
    type: "compliance"
    keywords:
      - "preparing for SOC 2"
      - "achieved SOC 2"
      - "seeking ISO 27001"
      - "GDPR audit"
      - "compliance readiness"
      - "compliance audit"
      - "HIPAA compliance"
      - "PCI-DSS compliance"
      - "FedRAMP ready"
      - "HITRUST certified"
      - "SOC 2 Type II"
      - "SOC2 Type II"
      - "DORA compliance"
      - "NIS2 readiness"
      - "data governance audit"
    score_boost: 25
    description: "Startups preparing for SOC 2, ISO, DORA, or GDPR audits have high immediate demand for security controls."
  - id: series_a_funding
    type: "funding"
    keywords:
      - "raises Series A"
      - "secured Series A"
      - "Series A funding"
      - "raised Series A"
      - "funding round"
      - "series B raised"
      - "seed round closed"
      - "funding round raised"
      - "raises millions"
      - "Series C closed"
      - "pre-seed funded"
      - "venture capital raised"
      - "secured capital"
    score_boost: 20
    description: "Post-funding injections require startups to quickly build secure infrastructure to sell to enterprise accounts."
  - id: security_leadership_change
    type: "leadership"
    keywords:
      - "joins as CISO"
      - "appointed Head of Security"
      - "new VP of Security"
      - "appoints new CISO"
      - "VP of InfoSec"
      - "Chief Information Security Officer"
      - "Security Architect joined"
      - "Director of InfoSec"
      - "Head of Cybersecurity appointed"
      - "joins as Chief Security Officer"
      - "appointed Security Lead"
    score_boost: 20
    description: "A new CISO or security lead typically initiates tool audits and implements new security vendor solutions."
  - id: global_expansion
    type: "expansion"
    keywords:
      - "enters US market"
      - "expands to Europe"
      - "global expansion"
      - "opening new data center"
      - "opening UK office"
      - "geographical expansion"
      - "sovereign cloud"
      - "multi-region deployment"
      - "cross-border expansion"
      - "opening APAC headquarters"
    score_boost: 15
    description: "Entering new geographies triggers strict regulatory requirements requiring security audits."
  - id: security_incident
    type: "incident"
    keywords:
      - "data breach"
      - "ransomware attack"
      - "critical vulnerability"
      - "security incident"
      - "database leak"
      - "credentials leaked"
      - "zero day exploit"
      - "patching flaw"
    score_boost: 30
    description: "Recent security incidents or vulnerabilities require immediate remediation and protective software deployments."
  - id: security_hiring_spree
    type: "hiring"
    keywords:
      - "hiring security engineer"
      - "infosec job opening"
      - "expanding security team"
      - "hiring penetration tester"
      - "security operations center analyst"
    score_boost: 15
    description: "Hiring security engineers indicates scaling infosec requirements and system auditing."
